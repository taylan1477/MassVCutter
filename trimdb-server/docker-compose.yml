version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: trimdb-postgres
    restart: always
    environment:
      POSTGRES_DB: trimdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
